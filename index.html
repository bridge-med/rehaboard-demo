<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RehaBoard - リハビリ部門管理ダッシュボード</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8fafc; --white: #ffffff; --border: #e2e8f0;
  --text: #1e293b; --dim: #64748b; --primary: #2563eb;
  --green: #16a34a; --orange: #ea580c; --red: #dc2626;
  --sidebar-w: 240px;
}
body { font-family: system-ui, -apple-system, 'Segoe UI', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--primary); text-decoration: none; }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--white); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s;
}
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
.sidebar-header p { font-size: 11px; color: var(--dim); margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section { padding: 8px 20px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); font-weight: 600; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 20px;
  cursor: pointer; font-size: 14px; color: var(--dim); transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: #f1f5f9; color: var(--text); }
.nav-item.active { background: #eff6ff; color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
.nav-item .icon { width: 20px; text-align: center; font-size: 16px; }

/* Main */
.main { margin-left: var(--sidebar-w); padding: 24px 32px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }

/* Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-header h2 { font-size: 22px; font-weight: 700; }
.month-selector { display: flex; align-items: center; gap: 8px; }
.month-selector button {
  width: 32px; height: 32px; border: 1px solid var(--border); background: var(--white);
  border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.month-selector button:hover { background: #f1f5f9; }
.month-selector select {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; background: var(--white); cursor: pointer;
}

/* Cards */
.card {
  background: var(--white); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; margin-bottom: 16px;
}
.card-title { font-size: 13px; color: var(--dim); font-weight: 500; margin-bottom: 12px; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
}
.kpi-label { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
.kpi-value { font-size: 28px; font-weight: 700; margin-bottom: 2px; }
.kpi-target { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
.kpi-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.kpi-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.kpi-pct { font-size: 12px; font-weight: 600; }

/* Period toggle */
.period-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.period-btn {
  padding: 6px 16px; font-size: 13px; border: none; background: var(--white);
  cursor: pointer; color: var(--dim); transition: all 0.15s;
}
.period-btn.active { background: var(--primary); color: white; }
.period-btn:not(:last-child) { border-right: 1px solid var(--border); }

/* Chart */
.chart-container { padding: 16px 0; }
.chart-bars { display: flex; align-items: flex-end; gap: 2px; height: 200px; padding-bottom: 24px; position: relative; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; position: relative; }
.chart-bar {
  width: 80%; min-width: 4px; max-width: 40px; background: var(--primary); border-radius: 3px 3px 0 0;
  transition: height 0.4s; position: relative; cursor: pointer;
}
.chart-bar.target-bar { background: #e2e8f0; }
.chart-bar-group { display: flex; gap: 2px; align-items: flex-end; flex: 1; justify-content: center; height: 100%; }
.chart-bar-group .chart-bar { width: 40%; max-width: 24px; }
.chart-label { font-size: 10px; color: var(--dim); margin-top: 4px; white-space: nowrap; position: absolute; bottom: -20px; }
.chart-tooltip {
  display: none; position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 5;
}
.chart-bar:hover .chart-tooltip { display: block; }
.chart-grid-line {
  position: absolute; left: 0; right: 0; border-top: 1px dashed #e2e8f0;
  font-size: 10px; color: var(--dim);
}
.chart-grid-label { position: absolute; left: -36px; top: -7px; font-size: 10px; color: var(--dim); }

/* Pace */
.pace-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.pace-card { display: flex; align-items: center; gap: 16px; }
.pace-ring { width: 80px; height: 80px; position: relative; }
.pace-ring svg { transform: rotate(-90deg); }
.pace-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
.pace-detail { font-size: 13px; color: var(--dim); line-height: 1.8; }
.pace-detail strong { color: var(--text); }
.remaining-box {
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
  padding: 14px 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 16px;
}
.remaining-box .big { font-size: 22px; font-weight: 700; color: var(--primary); }
.remaining-box .sub { font-size: 13px; color: var(--dim); }

/* Yesterday highlight */
.yesterday-card { border-left: 4px solid var(--primary); }
.yesterday-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.yesterday-pt { padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
.yesterday-pt .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.yesterday-pt .units { font-size: 20px; font-weight: 700; }
.yesterday-pt .flag { font-size: 12px; margin-top: 4px; }
.flag-star { color: var(--green); }
.flag-warn { color: var(--orange); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border);
  font-weight: 600; color: var(--dim); font-size: 12px; white-space: nowrap;
}
.data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:hover { background: #f8fafc; }
.data-table tr.expandable { cursor: pointer; }
.expand-row { display: none; }
.expand-row.open { display: table-row; }
.expand-row td { background: #f8fafc; padding: 16px; }
.mini-bar { height: 4px; background: #e2e8f0; border-radius: 2px; width: 80px; display: inline-block; overflow: hidden; vertical-align: middle; margin-left: 6px; }
.mini-bar-fill { height: 100%; border-radius: 2px; }
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.badge-green { background: #dcfce7; color: var(--green); }
.badge-orange { background: #fff7ed; color: var(--orange); }
.badge-red { background: #fef2f2; color: var(--red); }
.badge-blue { background: #eff6ff; color: var(--primary); }
.trend-dots { display: flex; gap: 3px; align-items: center; }
.trend-dot { width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }

/* Form */
.form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; color: var(--dim); font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.btn {
  padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: var(--white); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: #f1f5f9; }
.btn-sm { padding: 4px 12px; font-size: 12px; }

/* Briefing */
.briefing-text {
  background: #f8fafc; border: 1px solid var(--border); border-radius: 8px;
  padding: 20px; font-size: 14px; line-height: 1.8; white-space: pre-wrap;
  max-height: 600px; overflow-y: auto;
}

/* Target settings */
.target-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.target-input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; text-align: right; }
.summary-row td { font-weight: 700; background: #f8fafc !important; }
.diff-row td { color: var(--dim); font-style: italic; }

/* Settings */
.settings-section { margin-bottom: 24px; }
.pt-list-item {
  display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.pt-list-item.inactive { opacity: 0.5; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--text); color: white;
  padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000;
  transform: translateY(100px); opacity: 0; transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* Missing indicator */
.missing-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #fef2f2; color: var(--red); border-radius: 6px; font-size: 12px; font-weight: 600; }

/* Hamburger */
.hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 200; width: 40px; height: 40px; border: 1px solid var(--border); background: var(--white); border-radius: 8px; cursor: pointer; font-size: 20px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; padding: 16px; }
  .hamburger { display: flex; align-items: center; justify-content: center; }
  .overlay.show { display: block; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .pace-row { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .target-grid { grid-template-columns: repeat(2, 1fr); }
  .page-header { padding-top: 48px; }
}
</style>
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>RehaBoard</h1>
    <p>リハビリ部門管理</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">メイン</div>
    <div class="nav-item active" onclick="navigate('dashboard')"><span class="icon">📊</span>ダッシュボード</div>
    <div class="nav-item" onclick="navigate('pt-list')"><span class="icon">👥</span>PT実績一覧</div>
    <div class="nav-item" onclick="navigate('data-input')"><span class="icon">📝</span>データ入力</div>
    <div class="nav-item" onclick="navigate('briefing')"><span class="icon">📋</span>朝礼サマリー</div>
    <div class="nav-section">管理</div>
    <div class="nav-item" onclick="navigate('targets')"><span class="icon">🎯</span>目標設定</div>
    <div class="nav-item" onclick="navigate('settings')"><span class="icon">⚙️</span>設定</div>
  </nav>
</aside>

<main class="main">

<!-- ==================== DASHBOARD ==================== -->
<div class="page active" id="page-dashboard">
  <div class="page-header">
    <h2>ダッシュボード</h2>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">◀</button>
      <select id="monthSelect" onchange="setMonth(this.value)"></select>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
      <span class="card-title" style="margin-bottom:0;">単位数推移</span>
      <div class="period-toggle">
        <button class="period-btn active" onclick="setPeriod('daily',this)">日次</button>
        <button class="period-btn" onclick="setPeriod('weekly',this)">週次</button>
        <button class="period-btn" onclick="setPeriod('monthly',this)">月次</button>
        <button class="period-btn" onclick="setPeriod('yearly',this)">年次</button>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-bars" id="mainChart"></div>
    </div>
  </div>

  <div class="pace-row">
    <div class="card">
      <div class="card-title">進捗ペース</div>
      <div class="pace-card">
        <div class="pace-ring" id="paceRing"></div>
        <div class="pace-detail" id="paceDetail"></div>
      </div>
    </div>
    <div class="card" id="remainingCard">
      <div class="card-title">残り営業日ペース</div>
      <div id="remainingContent"></div>
    </div>
  </div>

  <div class="card yesterday-card">
    <div class="card-title" id="yesterdayLabel">前営業日の実績</div>
    <div class="yesterday-grid" id="yesterdayGrid"></div>
  </div>
</div>

<!-- ==================== PT LIST ==================== -->
<div class="page" id="page-pt-list">
  <div class="page-header">
    <h2>PT実績一覧</h2>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">◀</button>
      <select id="monthSelect2" onchange="setMonth(this.value)"></select>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table" id="ptTable">
      <thead>
        <tr>
          <th>名前</th><th>単位数</th><th>目標</th><th>達成率</th><th>進捗</th>
          <th>直近3日</th><th>患者数</th><th>新規</th><th>計画書</th><th>キャンセル</th>
          <th>前月比</th><th>ステータス</th>
        </tr>
      </thead>
      <tbody id="ptTableBody"></tbody>
    </table>
  </div>
</div>

<!-- ==================== DATA INPUT ==================== -->
<div class="page" id="page-data-input">
  <div class="page-header">
    <h2>データ入力</h2>
  </div>
  <div class="card">
    <div class="card-title">実績入力</div>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="form-group">
        <label>PT選択</label>
        <select id="inputPt"></select>
      </div>
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group"><label>&nbsp;</label><div id="missingDatesIndicator"></div></div>
    </div>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="form-group"><label>単位数</label><input type="number" id="inputUnits" min="0" placeholder="0"></div>
      <div class="form-group"><label>患者数</label><input type="number" id="inputPatients" min="0" placeholder="0"></div>
      <div class="form-group"><label>新規患者数</label><input type="number" id="inputNew" min="0" placeholder="0"></div>
    </div>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="form-group"><label>計画書数</label><input type="number" id="inputPlans" min="0" placeholder="0"></div>
      <div class="form-group"><label>キャンセル数</label><input type="number" id="inputCancel" min="0" placeholder="0"></div>
      <div class="form-group"><label>備考</label><textarea id="inputNotes" placeholder="備考を入力..."></textarea></div>
    </div>
    <button class="btn btn-primary" onclick="saveInput()">保存</button>
  </div>

  <div class="card">
    <div class="card-title">入力履歴</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="inputHistoryTable">
        <thead>
          <tr><th>日付</th><th>PT</th><th>単位数</th><th>患者数</th><th>新規</th><th>計画書</th><th>キャンセル</th><th>備考</th><th>操作</th></tr>
        </thead>
        <tbody id="inputHistoryBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ==================== BRIEFING ==================== -->
<div class="page" id="page-briefing">
  <div class="page-header">
    <h2>朝礼サマリー</h2>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="form-group" style="flex:0 0 auto;">
        <label>基準日</label>
        <input type="date" id="briefingDate">
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn btn-primary" onclick="generateBriefing()">生成</button>
      </div>
      <div class="form-group" style="flex:0 0 auto;">
        <label>&nbsp;</label>
        <button class="btn btn-secondary" onclick="copyBriefing()">クリップボードにコピー</button>
      </div>
    </div>
    <div class="briefing-text" id="briefingText">日付を選択して「生成」をクリックしてください。</div>
  </div>
</div>

<!-- ==================== TARGETS ==================== -->
<div class="page" id="page-targets">
  <div class="page-header">
    <h2>目標設定</h2>
    <div class="month-selector">
      <button onclick="changeMonth(-1)">◀</button>
      <select id="monthSelect3" onchange="setMonth(this.value)"></select>
      <button onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">部門全体目標</div>
    <div class="target-grid" id="deptTargetGrid"></div>
  </div>

  <div class="card">
    <div class="card-title">PT別目標</div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="ptTargetTable">
        <thead><tr><th>名前</th><th>単位数</th><th>患者数</th><th>新規</th><th>計画書</th></tr></thead>
        <tbody id="ptTargetBody"></tbody>
      </table>
    </div>
    <div style="margin-top:16px;">
      <button class="btn btn-primary" onclick="saveTargets()">すべて保存</button>
    </div>
  </div>
</div>

<!-- ==================== SETTINGS ==================== -->
<div class="page" id="page-settings">
  <div class="page-header"><h2>設定</h2></div>

  <div class="card settings-section">
    <div class="card-title">施設情報</div>
    <div class="form-grid" style="grid-template-columns:1fr 1fr;">
      <div class="form-group">
        <label>施設名</label>
        <input type="text" id="facilityName" value="BRIDGE リハビリテーション病院">
      </div>
      <div class="form-group">
        <label>営業日数（今月）</label>
        <input type="number" id="businessDays" min="1">
      </div>
    </div>
  </div>

  <div class="card settings-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div class="card-title" style="margin-bottom:0;">PTマスタ</div>
      <button class="btn btn-primary btn-sm" onclick="addPtDialog()">+ 追加</button>
    </div>
    <div id="ptMasterList"></div>
  </div>
</div>

</main>

<div class="toast" id="toast"></div>

<script>
// ===================================================================
// DATA
// ===================================================================
const MONTHS = [

  { key: '2026-02', label: '2026年2月', year: 2026, month: 2, bizDays: 20 },
  { key: '2026-03', label: '2026年3月', year: 2026, month: 3, bizDays: 22 },
  { key: '2026-04', label: '2026年4月', year: 2026, month: 4, bizDays: 18 },
];

let currentMonthIdx = 3; // April
let currentPeriod = 'daily';

const PTS = [
  { id: 'tanaka', name: '田中', active: true },
  { id: 'sato', name: '佐藤', active: true },
  { id: 'suzuki', name: '鈴木', active: true },
  { id: 'yamada', name: '山田', active: true },
  { id: 'kimura', name: '木村', active: true },
];

// Monthly department targets
const deptTargets = {
  '2026-01': { units: 1200, patients: 100, newPt: 15, plans: 12 },
  '2026-02': { units: 1300, patients: 110, newPt: 18, plans: 14 },
  '2026-03': { units: 1400, patients: 115, newPt: 20, plans: 16 },
  '2026-04': { units: 1500, patients: 120, newPt: 22, plans: 18 },
};

// PT individual targets (units per month)
const ptTargets = {
  '2026-01': { tanaka: 300, sato: 280, suzuki: 220, yamada: 200, kimura: 200 },

// ---- Generate daily data ----
function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
}

function generateDailyData() {
  const data = {};
  const profiles = {
    tanaka: { baseUnits: [16,16.5,17,17.5], basePat: [5,5,6,6], cancelRate: 0.03 },
    sato:   { baseUnits: [13.5,14,14.5,15], basePat: [4,4.5,5,5], cancelRate: 0.05 },
    suzuki: { baseUnits: [10.5,11,11.5,12], basePat: [3.5,4,4,4.5], cancelRate: 0.09 },
    yamada: { baseUnits: [9.5,10,10.5,11], basePat: [3,3.5,3.5,4], cancelRate: 0.07 },
    kimura: { baseUnits: [11.5,12,12.5,13], basePat: [3.5,4,4,4.5], cancelRate: 0.04 },
  };

  // Generate business day dates for each month
  MONTHS.forEach((m, mi) => {
    const mKey = m.key;
    data[mKey] = {};
    const bizDates = getBusinessDates(m.year, m.month, m.bizDays, mi === 3 ? 10 : m.bizDays);

    PTS.forEach(pt => {
      const prof = profiles[pt.id];
      const rng = seededRandom(pt.id.charCodeAt(0) * 100 + mi * 37);
      data[mKey][pt.id] = [];
      let newPtCount = 0;
      let planCount = 0;

      bizDates.forEach((d, di) => {
        const base = prof.baseUnits[mi];
        const units = Math.max(0, Math.round(base + (rng() - 0.5) * 6));
        const patBase = prof.basePat[mi];
        const patients = Math.max(1, Math.round(patBase + (rng() - 0.5) * 3));
        const isNew = rng() < (mi === 0 ? 0.12 : 0.15) ? 1 : 0;
        newPtCount += isNew;
        const isPlan = rng() < 0.08 ? 1 : 0;
        planCount += isPlan;
        const cancel = rng() < prof.cancelRate * 2.5 ? Math.round(rng() * 2) + 1 : 0;
        const notes = '';

        data[mKey][pt.id].push({
          date: d,
          units, patients,
          newPatients: isNew,
          plans: isPlan,
          cancel,
          notes
        });
      });
    });
  });
  return data;
}

function getBusinessDates(year, month, total, limit) {
  const dates = [];
  let d = new Date(year, month - 1, 1);
  while (dates.length < limit) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) {
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      dates.push(`${year}-${mm}-${dd}`);
    }
    d.setDate(d.getDate() + 1);
    if (d.getMonth() + 1 !== month && dates.length < limit) break;
  }
  return dates;
}

// ===================================================================
// HELPERS
// ===================================================================
function sumField(mKey, field, ptId) {
  const md = dailyData[mKey];
  if (!md) return 0;
  if (ptId) {
    return (md[ptId] || []).reduce((s, d) => s + (d[field] || 0), 0);
  }
  let total = 0;
  PTS.filter(p=>p.active).forEach(pt => { total += (md[pt.id] || []).reduce((s, d) => s + (d[field] || 0), 0); });
  return total;
}

function pct(val, target) { return target > 0 ? Math.round(val / target * 100) : 0; }

function colorForPct(p) {
  if (p >= 100) return 'var(--green)';
  if (p >= 80) return 'var(--primary)';
  if (p >= 60) return 'var(--orange)';
  return 'var(--red)';
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function getLastBusinessDate(mKey) {
  const md = dailyData[mKey];
  if (!md) return null;
  const firstPt = PTS.find(p => p.active);
  if (!firstPt || !md[firstPt.id] || md[firstPt.id].length === 0) return null;
  return md[firstPt.id][md[firstPt.id].length - 1].date;
}

function getElapsedBizDays(mKey) {
  const md = dailyData[mKey];
  if (!md) return 0;
  const firstPt = PTS.find(p => p.active);
  if (!firstPt || !md[firstPt.id]) return 0;
  return md[firstPt.id].length;
}

function badgeForPct(p) {
  if (p >= 100) return '<span class="badge badge-green">達成</span>';
  if (p >= 80) return '<span class="badge badge-blue">順調</span>';
  if (p >= 60) return '<span class="badge badge-orange">要注意</span>';
  return '<span class="badge badge-red">低迷</span>';
}

function statusBadgeForPace(achievePct, progressPct) {
  const ratio = progressPct > 0 ? achievePct / progressPct : 0;
  if (ratio >= 1.0) return '<span class="badge badge-green">順調</span>';
  if (ratio >= 0.85) return '<span class="badge badge-blue">概ね順調</span>';
  if (ratio >= 0.7) return '<span class="badge badge-orange">やや遅れ</span>';
  return '<span class="badge badge-red">要改善</span>';
}

function renderDailyChart(chart) {
  const mKey = cmKey();
  const md = dailyData[mKey];
  if (!md) { chart.innerHTML = ''; return; }
  const firstPt = PTS.find(p=>p.active);
  if (!firstPt || !md[firstPt.id]) { chart.innerHTML = ''; return; }
  const dates = md[firstPt.id].map(d => d.date);
  const values = dates.map(date => {
    let total = 0;
    PTS.filter(p=>p.active).forEach(pt => {
      const entry = (md[pt.id]||[]).find(d => d.date === date);
      if (entry) total += entry.units;
    });
    return total;
  });
  const dailyTarget = Math.round(deptTargets[mKey].units / cm().bizDays);
  const maxVal = Math.max(...values, dailyTarget) * 1.15;

  chart.innerHTML = values.map((v, i) => {
    const h = maxVal > 0 ? (v / maxVal * 100) : 0;
    const day = parseInt(dates[i].split('-')[2]);
    const isAbove = v >= dailyTarget;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${h}%;background:${isAbove ? 'var(--primary)' : '#93c5fd'};">
        <div class="chart-tooltip">${v}単位</div>
      </div>
      <span class="chart-label">${day}</span>
    </div>`;
  }).join('');
}

function renderWeeklyChart(chart) {
  const mKey = cmKey();
  const md = dailyData[mKey];
  if (!md) { chart.innerHTML = ''; return; }
  const firstPt = PTS.find(p=>p.active);
  if (!firstPt || !md[firstPt.id]) { chart.innerHTML = ''; return; }
  const dates = md[firstPt.id].map(d => d.date);

  // Group by week
  const weeks = [];
  let weekDates = [];
  dates.forEach(d => {
    const dow = new Date(d).getDay();
    weekDates.push(d);
    if (dow === 5 || d === dates[dates.length - 1]) {
      weeks.push([...weekDates]);
      weekDates = [];
    }
  });
  if (weekDates.length > 0) weeks.push(weekDates);

  const weeklyTarget = Math.round(deptTargets[mKey].units / cm().bizDays * 5);
  const values = weeks.map(wDates => {
    let total = 0;
    wDates.forEach(date => {
      PTS.filter(p=>p.active).forEach(pt => {
        const entry = (md[pt.id]||[]).find(d => d.date === date);
        if (entry) total += entry.units;
      });
    });
    return total;
  });
  const maxVal = Math.max(...values, weeklyTarget) * 1.15;

  chart.innerHTML = values.map((v, i) => {
    const h = maxVal > 0 ? (v / maxVal * 100) : 0;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar" style="height:${h}%;background:${v >= weeklyTarget ? 'var(--primary)' : '#93c5fd'};">
        <div class="chart-tooltip">${v}単位</div>
      </div>
      <span class="chart-label">W${i+1}</span>
    </div>`;
  }).join('');
}

function renderMonthlyChart(chart) {
  const values = MONTHS.map(m => sumField(m.key, 'units'));
  const targets = MONTHS.map(m => deptTargets[m.key].units);
  const maxVal = Math.max(...values, ...targets) * 1.15;

  chart.innerHTML = MONTHS.map((m, i) => {
    const vh = maxVal > 0 ? (values[i] / maxVal * 100) : 0;
    const th = maxVal > 0 ? (targets[i] / maxVal * 100) : 0;
    const isCurrent = i === currentMonthIdx;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-group">
        <div class="chart-bar target-bar" style="height:${th}%;">
          <div class="chart-tooltip">目標: ${targets[i]}</div>
        </div>
        <div class="chart-bar" style="height:${vh}%;background:${isCurrent ? 'var(--primary)' : '#93c5fd'};">
          <div class="chart-tooltip">${values[i]}単位</div>
        </div>
      </div>
      <span class="chart-label">${m.label.slice(5)}</span>
    </div>`;
  }).join('');
}

function renderYearlyChart(chart) {
  // Cumulative across all months
  let cumulative = 0;
  const vals = MONTHS.map(m => { cumulative += sumField(m.key, 'units'); return cumulative; });
  let cumTarget = 0;
  const tgtVals = MONTHS.map(m => { cumTarget += deptTargets[m.key].units; return cumTarget; });
  const maxVal = Math.max(vals[vals.length-1], tgtVals[tgtVals.length-1]) * 1.15;

  chart.innerHTML = MONTHS.map((m, i) => {
    const vh = maxVal > 0 ? (vals[i] / maxVal * 100) : 0;
    const th = maxVal > 0 ? (tgtVals[i] / maxVal * 100) : 0;
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-group">
        <div class="chart-bar target-bar" style="height:${th}%;">
          <div class="chart-tooltip">累計目標: ${tgtVals[i]}</div>
        </div>
        <div class="chart-bar" style="height:${vh}%;background:var(--primary);">
          <div class="chart-tooltip">累計: ${vals[i]}単位</div>
        </div>
      </div>
      <span class="chart-label">${m.label.slice(5)}</span>
    </div>`;
  }).join('');
}

function renderPace() {
  const mKey = cmKey();
  const m = cm();
  const elapsed = getElapsedBizDays(mKey);
  const progressPct = Math.round(elapsed / m.bizDays * 100);
  const units = sumField(mKey, 'units');
  const target = deptTargets[mKey].units;
  const achievePct = pct(units, target);

  // Ring SVG
  const ring = document.getElementById('paceRing');
  const r = 32, circ = 2 * Math.PI * r;
  const progOffset = circ - (progressPct / 100 * circ);
  const achOffset = circ - (Math.min(achievePct, 100) / 100 * circ);
  ring.innerHTML = `<svg width="80" height="80" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="6"/>
    <circle cx="40" cy="40" r="${r}" fill="none" stroke="#93c5fd" stroke-width="6" stroke-dasharray="${circ}" stroke-dashoffset="${progOffset}" stroke-linecap="round"/>
    <circle cx="40" cy="40" r="${r-8}" fill="none" stroke="#e2e8f0" stroke-width="6"/>
    <circle cx="40" cy="40" r="${r-8}" fill="none" stroke="${colorForPct(achievePct)}" stroke-width="6" stroke-dasharray="${2*Math.PI*(r-8)}" stroke-dashoffset="${2*Math.PI*(r-8) - (Math.min(achievePct,100)/100 * 2*Math.PI*(r-8))}" stroke-linecap="round"/>
  </svg>
  <div class="pace-ring-text">${achievePct}%</div>`;

  const detail = document.getElementById('paceDetail');
  const ratio = progressPct > 0 ? (achievePct / progressPct).toFixed(2) : '-';
  detail.innerHTML = `
    <div>営業日消化率: <strong>${progressPct}%</strong> (${elapsed}/${m.bizDays}日)</div>
    <div>達成率: <strong>${achievePct}%</strong> (${units.toLocaleString()}/${target.toLocaleString()}単位)</div>
    <div>ペース比: <strong style="color:${achievePct >= progressPct ? 'var(--green)' : 'var(--orange)'}">${ratio}</strong> ${achievePct >= progressPct ? '(目標ペース以上)' : '(目標ペース未満)'}</div>
  `;

  // Remaining
  const remaining = m.bizDays - elapsed;
  const remainingUnits = Math.max(0, target - units);
  const dailyNeeded = remaining > 0 ? Math.ceil(remainingUnits / remaining) : 0;
  const avgDaily = elapsed > 0 ? Math.round(units / elapsed) : 0;

  document.getElementById('remainingContent').innerHTML = `
    <div class="remaining-box">
      <div><div class="big">残り${remaining}営業日</div><div class="sub">1日あたり <strong>${dailyNeeded}単位</strong> 必要</div></div>
      <div style="border-left:1px solid #bfdbfe;padding-left:20px;">
        <div class="sub">現在の1日平均: <strong>${avgDaily}単位</strong></div>
        <div class="sub">残り必要単位: <strong>${remainingUnits.toLocaleString()}単位</strong></div>
        <div class="sub" style="color:${dailyNeeded <= avgDaily ? 'var(--green)' : 'var(--orange)'}">
          ${dailyNeeded <= avgDaily ? '現ペースで達成可能' : `1日あたり${dailyNeeded - avgDaily}単位の上積みが必要`}
        </div>
      </div>
    </div>
  `;
}

function renderYesterday() {
  const mKey = cmKey();

  if (!lastDate) { document.getElementById('yesterdayGrid').innerHTML = 'データなし'; return; }

  const d = new Date(lastDate);

  const md = dailyData[mKey];

  const grid = document.getElementById('yesterdayGrid');
  grid.innerHTML = PTS.filter(p=>p.active).map(pt => {
    const entry = (md[pt.id]||[]).find(e => e.date === lastDate);
    if (!entry) return '';
    const tgt = dailyTarget(pt.id);

    return `<div class="yesterday-pt">
      <div class="name">${pt.name}</div>
      <div class="units" style="color:${ratio >= 1 ? 'var(--green)' : ratio >= 0.7 ? 'var(--text)' : 'var(--orange)'}">${entry.units}単位</div>
      <div style="font-size:12px;color:var(--dim);">患者${entry.patients}名 / 目標${tgt}単位</div>
      ${flag}
    </div>`;
  }).join('');
}

function renderPtList() {
  const mKey = cmKey();
  const md = dailyData[mKey];
  const prevKey = currentMonthIdx > 0 ? MONTHS[currentMonthIdx - 1].key : null;
  const elapsed = getElapsedBizDays(mKey);
  const progressPct = Math.round(elapsed / cm().bizDays * 100);

  const tbody = document.getElementById('ptTableBody');
  tbody.innerHTML = '';

  PTS.filter(p=>p.active).forEach(pt => {
    const ptData = md[pt.id] || [];
    const units = ptData.reduce((s,d) => s + d.units, 0);
    const target = ptTargets[mKey][pt.id] || 0;
    const aPct = pct(units, target);
    const patients = ptData.reduce((s,d) => s + d.patients, 0);
    const newPt = ptData.reduce((s,d) => s + d.newPatients, 0);
    const plans = ptData.reduce((s,d) => s + d.plans, 0);
    const cancel = ptData.reduce((s,d) => s + d.cancel, 0);

    // MoM
    let mom = '-';
    if (prevKey) {
      const prevUnits = sumField(prevKey, 'units', pt.id);
      const prevElapsed = getElapsedBizDays(prevKey);
      if (prevElapsed > 0 && elapsed > 0) {
        const prevDailyAvg = prevUnits / prevElapsed;
        const curDailyAvg = units / elapsed;
        const momPct = prevDailyAvg > 0 ? Math.round((curDailyAvg / prevDailyAvg - 1) * 100) : 0;
        mom = (momPct >= 0 ? '+' : '') + momPct + '%';
      }
    }

    // Trend: last 3 days
    const last3 = ptData.slice(-3);
    const dailyTgt = target > 0 ? Math.round(target / cm().bizDays) : 0;
    const trendHtml = last3.map(d => {
      const ratio = dailyTgt > 0 ? d.units / dailyTgt : 0;
      const bg = ratio >= 1 ? 'var(--green)' : ratio >= 0.7 ? 'var(--orange)' : 'var(--red)';
      return `<div class="trend-dot" style="background:${bg}" title="${d.date}: ${d.units}単位">${d.units}</div>`;
    }).join('');

    const row = document.createElement('tr');
    row.className = 'expandable';
    row.onclick = () => {
      const next = row.nextElementSibling;
      if (next && next.classList.contains('expand-row')) next.classList.toggle('open');
    };
    row.innerHTML = `
      <td><strong>${pt.name}</strong></td>
      <td>${units}</td>
      <td>${target}</td>
      <td style="color:${colorForPct(aPct)};font-weight:600;">${aPct}%</td>
      <td><div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(100,aPct)}%;background:${colorForPct(aPct)}"></div></div></td>
      <td><div class="trend-dots">${trendHtml}</div></td>
      <td>${patients}</td>
      <td>${newPt}</td>
      <td>${plans}</td>
      <td>${cancel}</td>
      <td style="color:${mom.startsWith('+') ? 'var(--green)' : mom.startsWith('-') ? 'var(--red)' : 'var(--dim)'}">${mom}</td>
      <td>${statusBadgeForPace(aPct, progressPct)}</td>
    `;
    tbody.appendChild(row);

    // Expand row: daily breakdown
    const expandRow = document.createElement('tr');
    expandRow.className = 'expand-row';
    const dailyHtml = ptData.map(d => `
      <div style="display:inline-flex;gap:8px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px;margin:2px;">
        <span style="color:var(--dim)">${d.date.slice(5)}</span>
        <strong>${d.units}u</strong>
        <span>${d.patients}名</span>
        ${d.newPatients ? '<span style="color:var(--green)">新規</span>' : ''}
        ${d.plans ? '<span style="color:var(--primary)">計画</span>' : ''}
        ${d.cancel ? '<span style="color:var(--red)">C:' + d.cancel + '</span>' : ''}
        ${d.notes ? '<span style="color:var(--dim)">📝'+d.notes+'</span>' : ''}
      </div>
    `).join('');
    expandRow.innerHTML = `<td colspan="12"><div style="max-height:200px;overflow-y:auto;">${dailyHtml}</div></td>`;
    tbody.appendChild(expandRow);
  });
}

// ===================================================================
// DATA INPUT
// ===================================================================
function renderDataInput() {
  const ptSel = document.getElementById('inputPt');
  ptSel.innerHTML = PTS.filter(p=>p.active).map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  const lastDate = getLastBusinessDate(cmKey());
  if (lastDate) {
    document.getElementById('inputDate').value = lastDate;
  }

  updateMissingDates();
  renderInputHistory();
}

function updateMissingDates() {
  const ptId = document.getElementById('inputPt').value;
  const mKey = cmKey();
  const md = dailyData[mKey];
  if (!md || !md[ptId]) return;
  const enteredDates = new Set(md[ptId].map(d => d.date));
  const allBiz = getBusinessDates(cm().year, cm().month, cm().bizDays, cm().bizDays);
  // For April, only check dates up to the 10th business day
  const checkDates = currentMonthIdx === 3 ? allBiz.slice(0, 10) : allBiz;
  const missing = checkDates.filter(d => !enteredDates.has(d));

  const indicator = document.getElementById('missingDatesIndicator');
  if (missing.length > 0) {
    indicator.innerHTML = `<div class="missing-indicator">⚠ 未入力: ${missing.length}日 (${missing.map(d=>d.slice(8)).join(', ')}日)</div>`;
  } else {
    indicator.innerHTML = '<span style="color:var(--green);font-size:12px;">✓ 入力完了</span>';
  }
}

function saveInput() {
  const ptId = document.getElementById('inputPt').value;
  const date = document.getElementById('inputDate').value;
  if (!ptId || !date) { toast('PTと日付を選択してください'); return; }

  const entry = {
    date,
    units: parseInt(document.getElementById('inputUnits').value) || 0,
    patients: parseInt(document.getElementById('inputPatients').value) || 0,
    newPatients: parseInt(document.getElementById('inputNew').value) || 0,
    plans: parseInt(document.getElementById('inputPlans').value) || 0,
    cancel: parseInt(document.getElementById('inputCancel').value) || 0,
    notes: document.getElementById('inputNotes').value || '',
  };

  // Find which month
  const mKey = date.slice(0, 7);
  if (!dailyData[mKey]) dailyData[mKey] = {};
  if (!dailyData[mKey][ptId]) dailyData[mKey][ptId] = [];

  const existing = dailyData[mKey][ptId].findIndex(d => d.date === date);
  if (existing >= 0) {
    dailyData[mKey][ptId][existing] = entry;
  } else {
    dailyData[mKey][ptId].push(entry);
    dailyData[mKey][ptId].sort((a, b) => a.date.localeCompare(b.date));
  }

  // Clear inputs
  ['inputUnits','inputPatients','inputNew','inputPlans','inputCancel'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inputNotes').value = '';

  toast('保存しました');
  updateMissingDates();
  renderInputHistory();
}

function renderInputHistory() {
  const mKey = cmKey();
  const md = dailyData[mKey];
  if (!md) return;

  const tbody = document.getElementById('inputHistoryBody');
  const rows = [];
  PTS.filter(p=>p.active).forEach(pt => {
    (md[pt.id]||[]).forEach(d => {
      rows.push({ ...d, ptId: pt.id, ptName: pt.name });
    });
  });
  rows.sort((a, b) => b.date.localeCompare(a.date));

  tbody.innerHTML = rows.slice(0, 50).map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.ptName}</td>
      <td>${r.units}</td>
      <td>${r.patients}</td>
      <td>${r.newPatients}</td>
      <td>${r.plans}</td>
      <td>${r.cancel}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;">${r.notes||'-'}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="editEntry('${r.ptId}','${r.date}')">編集</button></td>
    </tr>
  `).join('');
}

function editEntry(ptId, date) {
  const mKey = date.slice(0, 7);
  const entry = (dailyData[mKey][ptId]||[]).find(d => d.date === date);
  if (!entry) return;

  document.getElementById('inputPt').value = ptId;
  document.getElementById('inputDate').value = date;
  document.getElementById('inputUnits').value = entry.units;
  document.getElementById('inputPatients').value = entry.patients;
  document.getElementById('inputNew').value = entry.newPatients;
  document.getElementById('inputPlans').value = entry.plans;
  document.getElementById('inputCancel').value = entry.cancel;
  document.getElementById('inputNotes').value = entry.notes || '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===================================================================
// BRIEFING
// ===================================================================
function renderBriefingPage() {
  const lastDate = getLastBusinessDate(cmKey());
  if (lastDate) document.getElementById('briefingDate').value = lastDate;
}

function generateBriefing() {
  const date = document.getElementById('briefingDate').value;
  if (!date) { toast('日付を選択してください'); return; }

  const mKey = date.slice(0, 7);
  const mIdx = MONTHS.findIndex(m => m.key === mKey);
  if (mIdx < 0) { toast('該当月のデータがありません'); return; }

  const m = MONTHS[mIdx];
  const md = dailyData[mKey];
  const target = deptTargets[mKey];
  const elapsed = getElapsedBizDays(mKey);
  const remaining = m.bizDays - elapsed;
  const totalUnits = sumField(mKey, 'units');
  const progressPct = Math.round(elapsed / m.bizDays * 100);
  const achievePct = pct(totalUnits, target.units);
  const paceRatio = progressPct > 0 ? (achievePct / progressPct).toFixed(2) : '-';
  const remainingUnits = Math.max(0, target.units - totalUnits);
  const dailyNeeded = remaining > 0 ? Math.ceil(remainingUnits / remaining) : 0;

  // Yesterday data
  const d = new Date(date);
  let yesterdayLines = [];
  let totalYestUnits = 0;
  PTS.filter(p=>p.active).forEach(pt => {
    const entry = (md[pt.id]||[]).find(e => e.date === date);
    if (entry) {
      totalYestUnits += entry.units;
      yesterdayLines.push(`  ${pt.name}: ${entry.units}単位 (患者${entry.patients}名${entry.cancel > 0 ? ', C:'+entry.cancel : ''})`);
    }
  });

  // New patients this month
  const totalNew = sumField(mKey, 'newPatients');
  const newTarget = target.newPt;

  // Cancel rate
  let totalCancel = 0, totalSessions = 0;
  PTS.filter(p=>p.active).forEach(pt => {
    (md[pt.id]||[]).forEach(e => { totalCancel += e.cancel; totalSessions += e.patients; });
  });
  const cancelRate = totalSessions > 0 ? (totalCancel / (totalSessions + totalCancel) * 100).toFixed(1) : '0.0';

  // Previous month cancel rate
  let prevCancelRate = '-';
  if (mIdx > 0) {
    const prevKey = MONTHS[mIdx-1].key;
    let pc = 0, ps = 0;
    PTS.filter(p=>p.active).forEach(pt => {
      (dailyData[prevKey][pt.id]||[]).forEach(e => { pc += e.cancel; ps += e.patients; });
    });
    prevCancelRate = ps > 0 ? (pc / (ps + pc) * 100).toFixed(1) : '0.0';
  }

  // PT topics
  const stars = [];
  const warnings = [];
  PTS.filter(p=>p.active).forEach(pt => {
    const ptData = md[pt.id] || [];
    const units = ptData.reduce((s,d) => s + d.units, 0);
    const ptTgt = ptTargets[mKey][pt.id] || 0;
    const aPct = pct(units, ptTgt);
    if (aPct >= progressPct) stars.push(`  ★ ${pt.name}: ${aPct}%達成 (${units}/${ptTgt}単位)`);
    else if (aPct < progressPct * 0.8) warnings.push(`  ▲ ${pt.name}: ${aPct}%達成 — ペース比${(aPct/progressPct).toFixed(2)}`);
  });

  // Missing input
  const missingPts = [];
  PTS.filter(p=>p.active).forEach(pt => {
    const entry = (md[pt.id]||[]).find(e => e.date === date);
    if (!entry) missingPts.push(pt.name);
  });

  const text = `━━━━━━━━━━━━━━━━━━━━━━━
朝礼サマリー ${date} (${['日','月','火','水','木','金','土'][d.getDay()]}曜日)
━━━━━━━━━━━━━━━━━━━━━━━

【昨日の実績】
  部門合計: ${totalYestUnits}単位
${yesterdayLines.join('\n')}

【月次進捗】${m.label}
  目標: ${target.units.toLocaleString()}単位
  実績: ${totalUnits.toLocaleString()}単位 (達成率${achievePct}%)
  営業日消化: ${elapsed}/${m.bizDays}日 (${progressPct}%)
  ペース比: ${paceRatio} ${achievePct >= progressPct ? '→ 目標ペース以上' : '→ 目標ペース未満'}
  残り${remaining}営業日 → 1日あたり${dailyNeeded}単位必要

【新規患者】
  今月: ${totalNew}名 / 目標${newTarget}名 (${pct(totalNew, newTarget)}%)

【キャンセル率】
  今月: ${cancelRate}% ${mIdx > 0 ? `(前月: ${prevCancelRate}%)` : ''}
  ${parseFloat(cancelRate) <= 5.0 ? '→ 目標範囲内' : '→ 目標(5.0%)を超過中'}

【PTトピック】
${stars.length > 0 ? '好調:\n' + stars.join('\n') : ''}
${warnings.length > 0 ? '要注意:\n' + warnings.join('\n') : ''}
${stars.length === 0 && warnings.length === 0 ? '  特記事項なし' : ''}

${missingPts.length > 0 ? '【未入力】\n  ' + missingPts.join(', ') + '\n  → 本日中に入力をお願いします' : '【入力状況】\n  全PT入力済み ✓'}

【本日のアクション】
  ${dailyNeeded > Math.round(totalUnits / Math.max(1, elapsed)) ? '・目標ペースを下回っています。各PTの単位数アップを意識しましょう' : '・順調なペースです。この調子を維持しましょう'}
  ${warnings.length > 0 ? '・' + warnings.map(w => w.trim().replace('▲ ','').split(':')[0]).join(', ') + 'のフォローアップ' : ''}
  ${parseFloat(cancelRate) > 5.0 ? '・キャンセル率改善のための対策検討' : ''}
━━━━━━━━━━━━━━━━━━━━━━━`;

  document.getElementById('briefingText').textContent = text;
}

function copyBriefing() {
  const text = document.getElementById('briefingText').textContent;
  if (text.startsWith('日付を')) { toast('先にサマリーを生成してください'); return; }
  navigator.clipboard.writeText(text).then(() => toast('コピーしました')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('コピーしました');
  });
}

// ===================================================================
// TARGETS
// ===================================================================
function renderTargets() {
  const mKey = cmKey();
  const t = deptTargets[mKey];

  document.getElementById('deptTargetGrid').innerHTML = [
    { label: '総単位数', key: 'units', val: t.units },
    { label: '患者数', key: 'patients', val: t.patients },
    { label: '新規患者数', key: 'newPt', val: t.newPt },
    { label: '計画書数', key: 'plans', val: t.plans },
  ].map(f => `
    <div class="form-group">
      <label>${f.label}</label>
      <input class="target-input" type="number" value="${f.val}" data-dept-target="${f.key}" onchange="deptTargets['${mKey}'].${f.key}=parseInt(this.value)||0">
    </div>
  `).join('');

  const tbody = document.getElementById('ptTargetBody');
  tbody.innerHTML = '';

  let sumUnits = 0, sumPat = 0, sumNew = 0, sumPlans = 0;

  PTS.filter(p=>p.active).forEach(pt => {
    const ptTgt = ptTargets[mKey][pt.id] || 0;
    const dtgt = ptDetailTargets[mKey][pt.id] || { patients: 0, newPt: 0, plans: 0 };
    sumUnits += ptTgt;
    sumPat += dtgt.patients;
    sumNew += dtgt.newPt;
    sumPlans += dtgt.plans;

    const row = document.createElement('tr');
    row.innerHTML = `
      <td><strong>${pt.name}</strong></td>
      <td><input class="target-input" type="number" value="${ptTgt}" style="width:100px" data-pt-unit="${pt.id}"></td>
      <td><input class="target-input" type="number" value="${dtgt.patients}" style="width:80px" data-pt-pat="${pt.id}"></td>
      <td><input class="target-input" type="number" value="${dtgt.newPt}" style="width:80px" data-pt-new="${pt.id}"></td>
      <td><input class="target-input" type="number" value="${dtgt.plans}" style="width:80px" data-pt-plan="${pt.id}"></td>
    `;
    tbody.appendChild(row);
  });

  // Summary row
  const sumRow = document.createElement('tr');
  sumRow.className = 'summary-row';
  sumRow.innerHTML = `<td>PT合計</td><td>${sumUnits}</td><td>${sumPat}</td><td>${sumNew}</td><td>${sumPlans}</td>`;
  tbody.appendChild(sumRow);

  // Diff row
  const diffRow = document.createElement('tr');
  diffRow.className = 'diff-row';
  diffRow.innerHTML = `<td>部門目標との差</td>
    <td style="color:${sumUnits >= t.units ? 'var(--green)':'var(--red)'}">${sumUnits - t.units >= 0 ? '+' : ''}${sumUnits - t.units}</td>
    <td style="color:${sumPat >= t.patients ? 'var(--green)':'var(--red)'}">${sumPat - t.patients >= 0 ? '+' : ''}${sumPat - t.patients}</td>
    <td style="color:${sumNew >= t.newPt ? 'var(--green)':'var(--red)'}">${sumNew - t.newPt >= 0 ? '+' : ''}${sumNew - t.newPt}</td>
    <td style="color:${sumPlans >= t.plans ? 'var(--green)':'var(--red)'}">${sumPlans - t.plans >= 0 ? '+' : ''}${sumPlans - t.plans}</td>`;
  tbody.appendChild(diffRow);
}

function saveTargets() {
  const mKey = cmKey();
  // Read PT targets
  PTS.filter(p=>p.active).forEach(pt => {
    const unitInput = document.querySelector(`[data-pt-unit="${pt.id}"]`);
    const patInput = document.querySelector(`[data-pt-pat="${pt.id}"]`);
    const newInput = document.querySelector(`[data-pt-new="${pt.id}"]`);
    const planInput = document.querySelector(`[data-pt-plan="${pt.id}"]`);
    if (unitInput) ptTargets[mKey][pt.id] = parseInt(unitInput.value) || 0;
    if (!ptDetailTargets[mKey][pt.id]) ptDetailTargets[mKey][pt.id] = {};
    if (patInput) ptDetailTargets[mKey][pt.id].patients = parseInt(patInput.value) || 0;
    if (newInput) ptDetailTargets[mKey][pt.id].newPt = parseInt(newInput.value) || 0;
    if (planInput) ptDetailTargets[mKey][pt.id].plans = parseInt(planInput.value) || 0;
  });
  toast('目標を保存しました');
  renderTargets();
}

// ===================================================================
// SETTINGS
// ===================================================================
function renderSettings() {
  document.getElementById('businessDays').value = cm().bizDays;

  const list = document.getElementById('ptMasterList');
  list.innerHTML = PTS.map((pt, i) => `
    <div class="pt-list-item ${pt.active ? '' : 'inactive'}">
      <div>
        <strong>${pt.name}</strong>
        <span style="color:var(--dim);font-size:12px;margin-left:8px;">${pt.id}</span>
        ${!pt.active ? '<span class="badge badge-red" style="margin-left:8px;">無効</span>' : ''}
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="editPt(${i})">編集</button>
        <button class="btn btn-secondary btn-sm" onclick="togglePt(${i})">${pt.active ? '無効化' : '有効化'}</button>
      </div>
    </div>
  `).join('');
}

function editPt(idx) {
  const pt = PTS[idx];
  const newName = prompt('名前を入力:', pt.name);
  if (newName && newName.trim()) {
    PTS[idx].name = newName.trim();
    renderSettings();
    toast('更新しました');
  }
}

function togglePt(idx) {
  PTS[idx].active = !PTS[idx].active;
  renderSettings();
  toast(PTS[idx].active ? '有効化しました' : '無効化しました');
}

function addPtDialog() {
  const name = prompt('新規PT名を入力:');
  if (!name || !name.trim()) return;
  const id = 'pt_' + Date.now();
  PTS.push({ id, name: name.trim(), active: true });
  // Initialize targets for new PT
  MONTHS.forEach(m => {
    if (!ptTargets[m.key][id]) ptTargets[m.key][id] = 0;
    if (!ptDetailTargets[m.key][id]) ptDetailTargets[m.key][id] = { patients: 0, newPt: 0, plans: 0 };
    if (!dailyData[m.key][id]) dailyData[m.key][id] = [];
  });
  renderSettings();
  toast('追加しました');
}

// ===================================================================
// RENDER ALL
// ===================================================================
function renderAll() {
  const activePage = document.querySelector('.page.active');
  if (activePage) {
    const id = activePage.id.replace('page-', '');
    renderCurrentPage(id);
  }
}

// ===================================================================
// INIT
// ===================================================================
function init() {
  initMonthSelectors();
  renderDashboard();

  // Listen for PT change in data input
  document.getElementById('inputPt').addEventListener('change', updateMissingDates);
}

init();
</script>
